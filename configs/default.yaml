# DiT: Audio-conditioned Motion Generation on BEAT_v2

data:
  root: "data/BEAT_v2/segment"
  motion_dim: 60
  audio_dim: 512
  motion_frames: 300     # 原始长度，用于上采样还原
  motion_downsample_ratio: 8   # motion 进 diffusion 前 8 倍下采样
  audio_downsample_ratio: 10   # audio 50fps→5fps，10 倍下采样
  motion_frames_low: 40        # 下采样后 motion 帧数 (300/8 取整且整除 patch_size)
  audio_frames_low: 25         # 下采样后 audio 帧数 (250/10 或 300/12)
  train_ratio: 0.95

model:
  dim: 1024               # 约 300M 参数（dim=1024, depth=24 -> ~308M）
  depth: 24
  heads: 16
  patch_size: 5          # temporal patch（对下采样后的 motion 长度 40）
  num_patches: 8         # 40 / 5
  cond_drop_prob: 0.1

diffusion:
  timesteps: 1000
  beta_schedule: "linear"  # linear, cosine
  beta_start: 0.0001
  beta_end: 0.02

train:
  batch_size: 64         # 300M 模型显存占用大，可据 GPU 再调小
  lr: 1e-4
  epochs: 200
  save_every: 10
  log_every: 50
  output_dir: "checkpoints"

generate:
  num_samples: 16
  cfg_scale: 3.0
  ddim_steps: 50   # DDIM 采样步数，可小于 diffusion.timesteps 以加速

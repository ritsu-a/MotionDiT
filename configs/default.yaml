# DiT: Audio-conditioned Motion Generation on BEAT_v2

data:
  root: "data/BEAT_v2/segment"
  motion_dim: 60
  audio_dim: 512
  motion_frames: 300
  audio_frames: 250
  train_ratio: 0.95

model:
  dim: 256
  depth: 12
  heads: 8
  patch_size: 5          # temporal patch
  num_patches: 60        # 300 / 5
  cond_drop_prob: 0.1

diffusion:
  timesteps: 1000
  beta_schedule: "linear"  # linear, cosine
  beta_start: 0.0001
  beta_end: 0.02

train:
  batch_size: 32
  lr: 1e-4
  epochs: 200
  save_every: 10
  log_every: 50
  output_dir: "checkpoints"

generate:
  num_samples: 16
  cfg_scale: 3.0
